name: Weekly Market Regime Score

on:
  schedule:
    - cron: '0 21 * * 5'  # Every Friday at 9pm UTC (10pm UK time)
  workflow_dispatch:        # Also allows manual run from GitHub

permissions:
  contents: write

jobs:
  run-regime-score:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regime scoring script
        run: python regime_score.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/regime_latest.json
          git commit -m "Weekly regime update: $(date +'%Y-%m-%d')" || echo "No changes"
          git push